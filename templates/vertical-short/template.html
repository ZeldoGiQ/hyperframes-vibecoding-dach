<!--
  Vertical Short template (15 seconds, 9:16)
  Variables: {{HOOK}}, {{CONTENT_LINE_1}}..{{CONTENT_LINE_4}}, {{CTA}}, {{PLATFORM}}, {{BRAND_NAME}}
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Fraunces:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: {{PRIMARY_COLOR}};
    --accent: {{ACCENT_COLOR}};
    --bg: {{BACKGROUND_COLOR}};
    --text: {{TEXT_COLOR}};
    --font-heading: '{{FONT_HEADING}}', sans-serif;
  }
  html { background: var(--bg); overflow: hidden; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1920px;
    background: var(--bg);
    font-family: var(--font-heading);
    overflow: hidden;
    position: relative;
    color: var(--text);
    transform-origin: top left;
    transform: scale(var(--preview-scale, 1));
  }

  /* Brand watermark */
  .watermark {
    position: absolute;
    top: 60px; left: 60px;
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.1em;
    opacity: 0.8;
    z-index: 10;
  }

  .scene { position: absolute; inset: 0; opacity: 0; padding: 80px; }

  /* Hook (0-2s) */
  .hook {
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    animation: fadeIn 0.3s ease-out 0s forwards, fadeOut 0.3s ease-in 1.7s forwards;
  }
  .hook-text {
    font-size: 140px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: hookZoom 0.4s ease-out forwards;
    transform: scale(0.7);
  }

  /* Content (2-12s) */
  .content {
    display: flex; flex-direction: column;
    justify-content: center;
    animation: fadeIn 0.3s ease-out 2s forwards, fadeOut 0.3s ease-in 11.7s forwards;
  }
  .content-line {
    font-size: 80px;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 48px;
    opacity: 0;
    transform: translateX(-30px);
  }
  .content-line:nth-child(1) { animation: lineIn 0.5s ease-out 2.3s forwards; }
  .content-line:nth-child(2) { animation: lineIn 0.5s ease-out 4.5s forwards; color: var(--primary); }
  .content-line:nth-child(3) { animation: lineIn 0.5s ease-out 7.0s forwards; }
  .content-line:nth-child(4) { animation: lineIn 0.5s ease-out 9.5s forwards; color: var(--accent); }

  /* CTA (12-15s) */
  .cta {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    animation: fadeIn 0.3s ease-out 12s forwards;
  }
  .cta-icon {
    font-size: 200px;
    animation: iconBounce 0.6s ease-out 12.3s forwards;
    transform: scale(0);
    margin-bottom: 40px;
  }
  .cta-text {
    font-size: 96px;
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 32px;
  }
  .cta-platform {
    font-size: 56px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes fadeOut { to { opacity: 0; } }
  @keyframes hookZoom {
    to { transform: scale(1); }
  }
  @keyframes lineIn {
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes iconBounce {
    to { transform: scale(1); }
  }
</style>
</head>
<body>
  <div class="watermark">@{{BRAND_NAME}}</div>

  <div class="scene hook">
    <div class="hook-text">{{HOOK}}</div>
  </div>

  <div class="scene content">
    <div class="content-line">{{CONTENT_LINE_1}}</div>
    <div class="content-line">{{CONTENT_LINE_2}}</div>
    <div class="content-line">{{CONTENT_LINE_3}}</div>
    <div class="content-line">{{CONTENT_LINE_4}}</div>
  </div>

  <div class="scene cta">
    <div class="cta-icon">👉</div>
    <div class="cta-text">{{CTA}}</div>
    <div class="cta-platform">on {{PLATFORM}}</div>
  </div>

  <script>
    (function () {
      var W = 1080, H = 1920;
      function fit() {
        var s = Math.min(window.innerWidth / W, window.innerHeight / H, 1);
        document.documentElement.style.setProperty('--preview-scale', s);
      }
      window.addEventListener('resize', fit);
      fit();
      window.__seekToTime = function (timeInMs) {
        document.getAnimations().forEach(function (a) {
          try { a.pause(); } catch (_) {}
          try {
            var d = (a.effect && a.effect.getTiming) ? (a.effect.getTiming().delay || 0) : 0;
            a.currentTime = timeInMs - d;
          } catch (_) {}
        });
      };
    })();
  </script>
</body>
</html>
