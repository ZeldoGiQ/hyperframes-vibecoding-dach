<!--
  AIVC Overlay: Subtitle Card
  Variables: {{SPEAKER}}, {{QUOTE}}
  TRANSPARENT background — overlay only.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary-color: #00FF94;
    --text-color: #FFFFFF;
    --bg-color: rgba(10, 10, 10, 0.88);
    --font-size-quote: 40px;
    --font-size-speaker: 22px;
    --animation-duration: 0.45s;
  }
  html, body { background: transparent; margin: 0; padding: 0; }
  * { box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .subtitle-wrap {
    position: absolute;
    left: 50%;
    bottom: 96px;
    transform: translate(-50%, 24px);
    opacity: 0;
    animation: fadeUp var(--animation-duration) cubic-bezier(0.16, 1, 0.3, 1) forwards;
    max-width: 1400px;
    width: max-content;
  }
  .card {
    background: var(--bg-color);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    padding: 36px 56px;
    position: relative;
  }
  .speaker {
    text-transform: uppercase;
    color: var(--text-color);
    opacity: 0.55;
    font-size: var(--font-size-speaker);
    font-weight: 600;
    letter-spacing: 0.18em;
    margin-bottom: 14px;
  }
  .quote {
    color: var(--text-color);
    font-size: var(--font-size-quote);
    font-weight: 500;
    line-height: 1.3;
    letter-spacing: -0.005em;
    position: relative;
  }
  .quote::before,
  .quote::after {
    content: "\201C";
    color: var(--primary-color);
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 1.3em;
    line-height: 0;
    position: relative;
    top: 0.18em;
  }
  .quote::after {
    content: "\201D";
    margin-left: 0.08em;
  }
  .quote::before {
    margin-right: 0.12em;
  }
  @keyframes fadeUp {
    0%   { opacity: 0; transform: translate(-50%, 24px); }
    100% { opacity: 1; transform: translate(-50%, 0); }
  }
</style>
</head>
<body>
  <div class="subtitle-wrap">
    <div class="card">
      <div class="speaker">{{SPEAKER}}</div>
      <div class="quote">{{QUOTE}}</div>
    </div>
  </div>
</body>
</html>
