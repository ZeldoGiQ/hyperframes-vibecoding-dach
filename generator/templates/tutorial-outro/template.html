<!--
  Tutorial-Outro template (15 seconds, 16:9)
  Variables: {{BRAND_NAME}}, {{RECAP_1}}, {{RECAP_2}}, {{RECAP_3}}, {{NEXT_VIDEO}}, {{LOGO_PATH}}
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Fraunces:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: {{PRIMARY_COLOR}};
    --accent: {{ACCENT_COLOR}};
    --bg: {{BACKGROUND_COLOR}};
    --text: {{TEXT_COLOR}};
    --font-heading: '{{FONT_HEADING}}', sans-serif;
  }
  html { background: var(--bg); overflow: hidden; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: var(--bg);
    font-family: var(--font-heading);
    overflow: hidden;
    position: relative;
    color: var(--text);
    transform-origin: top left;
    transform: scale(var(--preview-scale, 1));
  }

  .scene { position: absolute; inset: 0; opacity: 0; padding: 120px; }

  /* Recap (0-5s) */
  .recap {
    display: flex; flex-direction: column;
    justify-content: center;
    animation: fadeIn 0.5s ease-out 0s forwards, fadeOut 0.4s ease-in 4.6s forwards;
  }
  .recap-title {
    font-size: 80px; font-weight: 800;
    margin-bottom: 64px;
    color: var(--text);
  }
  .recap-title .accent { color: var(--accent); }
  .recap-list { display: flex; flex-direction: column; gap: 32px; }
  .recap-item {
    display: flex; align-items: center;
    font-size: 48px; font-weight: 600;
    opacity: 0;
    transform: translateX(-40px);
  }
  .recap-item:nth-child(1) { animation: slideInLeft 0.5s ease-out 0.5s forwards; }
  .recap-item:nth-child(2) { animation: slideInLeft 0.5s ease-out 1.0s forwards; }
  .recap-item:nth-child(3) { animation: slideInLeft 0.5s ease-out 1.5s forwards; }
  .recap-check {
    width: 64px; height: 64px;
    background: var(--primary);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-right: 32px;
    color: var(--bg);
    font-weight: 900;
    font-size: 36px;
  }

  /* Subscribe (5-10s) */
  .subscribe {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    animation: fadeIn 0.5s ease-out 5s forwards, fadeOut 0.4s ease-in 9.6s forwards;
  }
  .subscribe-button {
    background: var(--primary);
    color: var(--bg);
    padding: 40px 100px;
    border-radius: 100px;
    font-size: 80px;
    font-weight: 900;
    margin-bottom: 40px;
    animation: bounce 0.6s ease-out 5.3s forwards, glow 1.5s ease-in-out 6s infinite;
    transform: scale(0.8);
    opacity: 0;
  }
  .subscribe-text {
    font-size: 48px;
    font-weight: 600;
  }
  .arrow-down {
    margin-top: 60px;
    font-size: 100px;
    animation: arrowBounce 0.8s ease-in-out infinite;
  }

  /* Next Video (10-15s) */
  .next-video {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    animation: fadeIn 0.5s ease-out 10s forwards;
  }
  .next-label {
    font-size: 32px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 32px;
    font-weight: 700;
  }
  .next-card {
    background: rgba(255,255,255,0.05);
    border: 3px solid var(--primary);
    border-radius: 32px;
    padding: 80px 120px;
    max-width: 1400px;
  }
  .next-title {
    font-size: 72px;
    font-weight: 800;
    line-height: 1.2;
  }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes fadeOut { to { opacity: 0; } }
  @keyframes slideInLeft {
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes bounce {
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 40px var(--primary); }
    50% { box-shadow: 0 0 80px var(--primary); }
  }
  @keyframes arrowBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(20px); }
  }
</style>
</head>
<body>
  <div class="scene recap">
    <div class="recap-title">What you <span class="accent">learned</span></div>
    <div class="recap-list">
      <div class="recap-item"><div class="recap-check">✓</div>{{RECAP_1}}</div>
      <div class="recap-item"><div class="recap-check">✓</div>{{RECAP_2}}</div>
      <div class="recap-item"><div class="recap-check">✓</div>{{RECAP_3}}</div>
    </div>
  </div>

  <div class="scene subscribe">
    <div class="subscribe-button">Subscribe</div>
    <div class="subscribe-text">Never miss a tutorial!</div>
    <div class="arrow-down">↓</div>
  </div>

  <div class="scene next-video">
    <div class="next-label">Up next</div>
    <div class="next-card">
      <div class="next-title">{{NEXT_VIDEO}}</div>
    </div>
  </div>

  <script>
    (function () {
      var W = 1920, H = 1080;
      function fit() {
        var s = Math.min(window.innerWidth / W, window.innerHeight / H, 1);
        document.documentElement.style.setProperty('--preview-scale', s);
      }
      window.addEventListener('resize', fit);
      fit();
      window.__seekToTime = function (timeInMs) {
        document.getAnimations().forEach(function (a) {
          try { a.pause(); } catch (_) {}
          try {
            var d = (a.effect && a.effect.getTiming) ? (a.effect.getTiming().delay || 0) : 0;
            a.currentTime = timeInMs - d;
          } catch (_) {}
        });
      };
    })();
  </script>
</body>
</html>
